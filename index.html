<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Kids PRO</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background: linear-gradient(180deg,#4facfe,#00f2fe);
}

.app {
  max-width:430px;
  margin:auto;
  min-height:100vh;
  padding:16px;
}

.card {
  background:white;
  border-radius:20px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;
}

.title {
  font-size:22px;
  font-weight:bold;
}

.word {
  font-size:26px;
  margin:10px 0;
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#4CAF50;
  color:white;
  font-size:16px;
  margin-top:10px;
}

.option {
  background:#eee;
  margin-top:8px;
}

.correct {
  background:#4CAF50 !important;
}

.wrong {
  background:#f44336 !important;
}

img {
  width:100%;
  border-radius:14px;
}
</style>
</head>

<body>

<div class="app" id="app"></div>

<script>
const lessons = [
{
  title:"Цифры",
  words:[
    {en:"one", ru:"один", img:"https://img.icons8.com/color/96/1.png"},
    {en:"two", ru:"два", img:"https://img.icons8.com/color/96/2.png"},
    {en:"three", ru:"три", img:"https://img.icons8.com/color/96/3.png"},
    {en:"four", ru:"четыре", img:"https://img.icons8.com/color/96/4.png"},
    {en:"five", ru:"пять", img:"https://img.icons8.com/color/96/5.png"}
  ]
},
{
  title:"Животные",
  words:[
    {en:"cat", ru:"кот", img:"https://img.icons8.com/color/96/cat.png"},
    {en:"dog", ru:"собака", img:"https://img.icons8.com/color/96/dog.png"},
    {en:"cow", ru:"корова", img:"https://img.icons8.com/color/96/cow.png"}
  ]
}
];

let state = {
  screen:"home",
  lesson:null,
  score:0
};

function speak(text){
  let u = new SpeechSynthesisUtterance(text);
  u.lang="en-US";
  speechSynthesis.speak(u);
}

function render(){
  const app = document.getElementById("app");

  if(state.screen==="home"){
    app.innerHTML = `
      <div class="card">
        <div class="title">🚀 Английский</div>
        <div>Очки: ${state.score}</div>
      </div>

      ${lessons.map((l,i)=>`
        <div class="card">
          <button onclick="openLesson(${i})">${l.title}</button>
        </div>
      `).join("")}
    `;
  }

  if(state.screen==="lesson"){
    let l = lessons[state.lesson];

    app.innerHTML = `
      <button onclick="home()">⬅ Назад</button>

      ${l.words.map(w=>`
        <div class="card">
          <div class="word">${w.en}</div>
          <img src="${w.img}">
          <div>${w.ru}</div>
          <button onclick="speak('${w.en}')">🔊 Слушать</button>
          <button onclick="startGame()">🎮 Играть</button>
        </div>
      `).join("")}
    `;
  }

  if(state.screen==="game"){
    let l = lessons[state.lesson];
    let correct = l.words[Math.floor(Math.random()*l.words.length)];

    let options = [...l.words]
      .sort(()=>0.5-Math.random())
      .slice(0,3);

    if(!options.includes(correct)){
      options[0]=correct;
    }

    speak(correct.en);

    app.innerHTML = `
      <button onclick="home()">⬅ Назад</button>

      <div class="card">
        <div class="word">${correct.en}</div>
        ${options.map(o=>`
          <button class="option" onclick="check('${o.ru}','${correct.ru}',this)">
            ${o.ru}
          </button>
        `).join("")}
      </div>
    `;
  }
}

function openLesson(i){
  state.lesson=i;
  state.screen="lesson";
  render();
}

function home(){
  state.screen="home";
  render();
}

function startGame(){
  state.screen="game";
  render();
}

function check(answer, correct, btn){
  if(answer===correct){
    btn.classList.add("correct");
    state.score++;
    setTimeout(()=>{
      alert("🎉 Молодец!");
      render();
    },500);
  } else {
    btn.classList.add("wrong");
    setTimeout(()=>{
      alert("Правильно: "+correct);
      render();
    },500);
  }
}

render();
</script>

</body>
</html>
